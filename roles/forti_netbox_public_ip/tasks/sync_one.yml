- name: Look up NetBox interface by device and name
  ansible.builtin.uri:
    url: "{{ netbox_api_base_url }}/dcim/interfaces/?device_id={{ netbox_target_device_id | int }}&name={{ forti_sync_item.netbox_interface | urlencode }}&limit=2"
    method: GET
    headers: "{{ netbox_api_headers }}"
    validate_certs: "{{ netbox_validate_certs }}"
    timeout: "{{ netbox_api_timeout | int }}"
    return_content: true
    status_code: 200
  register: netbox_interface_lookup
  changed_when: false

- name: Ensure NetBox interface lookup is not ambiguous
  ansible.builtin.assert:
    that:
      - netbox_interface_lookup.json.count | int <= 1
    fail_msg: >-
      NetBox interface '{{ forti_sync_item.netbox_interface }}' on device '{{ netbox_device_name }}'
      is ambiguous (count={{ netbox_interface_lookup.json.count | int }}).

- name: Mark interface missing state
  ansible.builtin.set_fact:
    netbox_interface_missing_current: "{{ netbox_interface_lookup.json.count | int == 0 }}"

- name: Fail when NetBox interface is missing and skip mode is disabled
  ansible.builtin.assert:
    that:
      - not netbox_interface_missing_current | bool
    fail_msg: >-
      NetBox interface '{{ forti_sync_item.netbox_interface }}' was not found on device '{{ netbox_device_name }}'.
      Add the interface in NetBox or set netbox_skip_missing_interfaces=true.
  when: not netbox_skip_missing_interfaces | bool

- name: Skip missing NetBox interface in skip mode
  ansible.builtin.debug:
    msg: >-
      Skipping {{ forti_sync_item.forti_interface }} ({{ forti_sync_item.selected_cidr }}):
      NetBox interface '{{ forti_sync_item.netbox_interface }}' does not exist on '{{ netbox_device_name }}'.
  when:
    - netbox_skip_missing_interfaces | bool
    - netbox_interface_missing_current | bool

- name: Store NetBox interface ID
  ansible.builtin.set_fact:
    netbox_target_interface_id: "{{ netbox_interface_lookup.json.results[0].id | int }}"
  when: not netbox_interface_missing_current | bool

- name: Build effective description for this IP
  ansible.builtin.set_fact:
    netbox_ip_description_effective: >-
      {{
        netbox_ip_description
        if netbox_ip_description | length > 0
        else ('Synced from FortiGate ' ~ forti_host ~ ' interface ' ~ forti_sync_item.forti_interface)
      }}
  when: not netbox_interface_missing_current | bool

- name: Look up NetBox IP by address
  ansible.builtin.uri:
    url: "{{ netbox_api_base_url }}/ipam/ip-addresses/?address={{ forti_sync_item.selected_cidr | urlencode }}&limit=2"
    method: GET
    headers: "{{ netbox_api_headers }}"
    validate_certs: "{{ netbox_validate_certs }}"
    timeout: "{{ netbox_api_timeout | int }}"
    return_content: true
    status_code: 200
  register: netbox_ip_lookup
  changed_when: false
  when: not netbox_interface_missing_current | bool

- name: Ensure NetBox IP lookup is not ambiguous
  ansible.builtin.assert:
    that:
      - netbox_ip_lookup.json.count | int <= 1
    fail_msg: >-
      NetBox IP '{{ forti_sync_item.selected_cidr }}' matched multiple objects.
      Narrow scope in NetBox (for example with VRF) before automation.
  when: not netbox_interface_missing_current | bool

- name: Build NetBox IP payload
  ansible.builtin.set_fact:
    netbox_ip_payload: >-
      {{
        {
          'status': netbox_ip_status,
          'assigned_object_type': 'dcim.interface',
          'assigned_object_id': netbox_target_interface_id | int,
          'description': netbox_ip_description_effective
        }
        | combine(
            (netbox_ip_dns_name | length > 0)
            | ternary({'dns_name': netbox_ip_dns_name}, {})
          )
      }}
  when: not netbox_interface_missing_current | bool

- name: Create NetBox IP when missing
  ansible.builtin.uri:
    url: "{{ netbox_api_base_url }}/ipam/ip-addresses/"
    method: POST
    headers: "{{ netbox_api_headers | combine({'Content-Type': 'application/json'}) }}"
    body_format: json
    body: "{{ {'address': forti_sync_item.selected_cidr} | combine(netbox_ip_payload) }}"
    validate_certs: "{{ netbox_validate_certs }}"
    timeout: "{{ netbox_api_timeout | int }}"
    return_content: true
    status_code: 201
  register: netbox_ip_created
  changed_when: true
  when:
    - not netbox_interface_missing_current | bool
    - netbox_ip_lookup.json.count | int == 0

- name: Store existing NetBox IP object
  ansible.builtin.set_fact:
    netbox_existing_ip_obj: "{{ netbox_ip_lookup.json.results[0] }}"
  when:
    - not netbox_interface_missing_current | bool
    - netbox_ip_lookup.json.count | int == 1

- name: Parse existing NetBox IP fields
  ansible.builtin.set_fact:
    netbox_existing_ip_id: "{{ netbox_existing_ip_obj.id | int }}"
    netbox_existing_assigned_id: >-
      {{
        (
          (netbox_existing_ip_obj.assigned_object | default({})).id
          | default(netbox_existing_ip_obj.assigned_object_id | default(0))
        ) | int
      }}
    netbox_existing_status: >-
      {{
        (netbox_existing_ip_obj.status | default({})).value
        | default(netbox_existing_ip_obj.status | default(''))
      }}
    netbox_existing_description: "{{ netbox_existing_ip_obj.description | default('') }}"
    netbox_existing_dns_name: "{{ netbox_existing_ip_obj.dns_name | default('') }}"
  when:
    - not netbox_interface_missing_current | bool
    - netbox_ip_lookup.json.count | int == 1

- name: Prevent reassignment unless explicitly allowed
  ansible.builtin.assert:
    that:
      - netbox_allow_reassign | bool or netbox_existing_assigned_id in [0, netbox_target_interface_id | int]
    fail_msg: >-
      IP {{ forti_sync_item.selected_cidr }} is assigned to object id={{ netbox_existing_assigned_id }}.
      Set netbox_allow_reassign=true to move it to {{ netbox_target_interface_id }}.
  when:
    - not netbox_interface_missing_current | bool
    - netbox_ip_lookup.json.count | int == 1

- name: Check whether existing NetBox IP needs an update
  ansible.builtin.set_fact:
    netbox_ip_needs_update: >-
      {{
        (netbox_existing_assigned_id != (netbox_target_interface_id | int))
        or (netbox_existing_status | lower != netbox_ip_status | lower)
        or (netbox_existing_description != netbox_ip_description_effective)
        or (netbox_existing_dns_name != netbox_ip_dns_name)
      }}
  when:
    - not netbox_interface_missing_current | bool
    - netbox_ip_lookup.json.count | int == 1

- name: Update existing NetBox IP when fields differ
  ansible.builtin.uri:
    url: "{{ netbox_api_base_url }}/ipam/ip-addresses/{{ netbox_existing_ip_id }}/"
    method: PATCH
    headers: "{{ netbox_api_headers | combine({'Content-Type': 'application/json'}) }}"
    body_format: json
    body: "{{ netbox_ip_payload }}"
    validate_certs: "{{ netbox_validate_certs }}"
    timeout: "{{ netbox_api_timeout | int }}"
    return_content: true
    status_code: 200
  changed_when: true
  when:
    - not netbox_interface_missing_current | bool
    - netbox_ip_lookup.json.count | int == 1
    - netbox_ip_needs_update | bool

- name: Track synced NetBox IP id from create
  ansible.builtin.set_fact:
    netbox_synced_ip_id: "{{ netbox_ip_created.json.id | int }}"
  when:
    - not netbox_interface_missing_current | bool
    - netbox_ip_lookup.json.count | int == 0

- name: Track synced NetBox IP id from existing object
  ansible.builtin.set_fact:
    netbox_synced_ip_id: "{{ netbox_existing_ip_id | int }}"
  when:
    - not netbox_interface_missing_current | bool
    - netbox_ip_lookup.json.count | int == 1

- name: Store synced IP id for this Forti interface
  ansible.builtin.set_fact:
    netbox_synced_ip_ids: "{{ netbox_synced_ip_ids | combine({(forti_sync_item.forti_interface ~ ':' ~ forti_sync_item.family): netbox_synced_ip_id | int}) }}"
    netbox_synced_ip4_ids: >-
      {{
        netbox_synced_ip4_ids | combine({forti_sync_item.forti_interface: netbox_synced_ip_id | int})
        if forti_sync_item.family == 'ipv4'
        else netbox_synced_ip4_ids
      }}
    netbox_synced_ip6_ids: >-
      {{
        netbox_synced_ip6_ids | combine({forti_sync_item.forti_interface: netbox_synced_ip_id | int})
        if forti_sync_item.family == 'ipv6'
        else netbox_synced_ip6_ids
      }}
  when: not netbox_interface_missing_current | bool
